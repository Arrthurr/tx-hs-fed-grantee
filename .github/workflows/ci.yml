# CI: lint, typecheck, unit tests, and production build on every pull request
# and on pushes to main. Prevents regressions (e.g. a failing lint or build)
# from landing on main.
#
# E2E (Playwright) is intentionally omitted: the suite is currently out of
# sync with the UI and needs a live Google Maps API key + dev server.
# Re-enable it once the suite is reconciled and a VITE_GOOGLE_MAPS_API_KEY
# secret is configured.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --ci

      - name: Build
        run: npm run build
